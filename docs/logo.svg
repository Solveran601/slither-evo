<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#44ee55"/>
      <stop offset="50%" stop-color="#22ddff"/>
      <stop offset="100%" stop-color="#bb55ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Worm body -->
  <path d="M20 64 Q30 30 50 40 Q70 50 80 35 Q90 20 108 30" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Worm segments -->
  <circle cx="38" cy="40" r="5" fill="#44ee55" opacity="0.6"/>
  <circle cx="56" cy="43" r="4" fill="#33dd88" opacity="0.5"/>
  <circle cx="74" cy="38" r="3.5" fill="#22ccbb" opacity="0.4"/>
  <!-- Head -->
  <circle cx="108" cy="30" r="8" fill="#22ddff" filter="url(#glow)"/>
  <circle cx="111" cy="27" r="2.5" fill="#fff"/>
  <circle cx="104" cy="27" r="2.5" fill="#fff"/>
  <circle cx="111" cy="27" r="1.2" fill="#050510"/>
  <circle cx="104" cy="27" r="1.2" fill="#050510"/>
  <!-- Food particles -->
  <circle cx="15" cy="80" r="2.5" fill="#44ee55" opacity="0.8"/>
  <circle cx="35" cy="90" r="2" fill="#ffd700" opacity="0.9"/>
  <circle cx="110" cy="75" r="2.5" fill="#44ee55" opacity="0.7"/>
  <circle cx="95" cy="100" r="2" fill="#a855f7" opacity="0.6"/>
  <!-- DNA helix accent -->
  <path d="M25 95 L30 88 L35 95 L40 88" fill="none" stroke="#ff44aa" stroke-width="1.5" opacity="0.4"/>
  <path d="M27 100 L32 93 L37 100 L42 93" fill="none" stroke="#ff44aa" stroke-width="1.5" opacity="0.3"/>
</svg>
