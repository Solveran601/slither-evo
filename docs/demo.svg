<svg viewBox="0 0 1200 750" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgG" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#05050a"/>
    </radialGradient>
    <radialGradient id="eyeG" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#eee"/><stop offset="100%" stop-color="#fff"/>
    </radialGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="1.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bgG)"/>

  <!-- Grid (1000px intervals in game space) -->
  <line x1="200" y1="0" x2="200" y2="750" stroke="#111125" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="750" stroke="#111125" stroke-width="0.5"/>
  <line x1="1000" y1="0" x2="1000" y2="750" stroke="#111125" stroke-width="0.5"/>
  <line x1="0" y1="130" x2="1200" y2="130" stroke="#111125" stroke-width="0.5"/>
  <line x1="0" y1="380" x2="1200" y2="380" stroke="#111125" stroke-width="0.5"/>
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#111125" stroke-width="0.5"/>

  <!-- Game border -->
  <rect x="10" y="10" width="1180" height="730" fill="none" stroke="#2a2a4a" stroke-width="2"/>

  <!-- Team zone: Red -->
  <circle cx="300" cy="200" r="110" fill="#ff003c" opacity="0.06" stroke="#ff003c" stroke-width="2.5" stroke-opacity="0.3"/>
  <text x="300" y="195" fill="#ff003c" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" opacity="0.8">RED</text>
  <text x="300" y="210" fill="#ff003c" font-family="sans-serif" font-size="8" text-anchor="middle" opacity="0.5">EPOCH 42</text>

  <!-- Team zone: Green -->
  <circle cx="900" cy="550" r="110" fill="#00ff88" opacity="0.06" stroke="#00ff88" stroke-width="2.5" stroke-opacity="0.3"/>
  <text x="900" y="545" fill="#00ff88" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" opacity="0.8">GREEN</text>
  <text x="900" y="560" fill="#00ff88" font-family="sans-serif" font-size="8" text-anchor="middle" opacity="0.5">EPOCH 38</text>

  <!-- Team zone: Blue -->
  <circle cx="200" cy="580" r="95" fill="#4488ff" opacity="0.06" stroke="#4488ff" stroke-width="2.5" stroke-opacity="0.3"/>
  <text x="200" y="575" fill="#4488ff" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" opacity="0.8">BLUE</text>
  <text x="200" y="590" fill="#4488ff" font-family="sans-serif" font-size="8" text-anchor="middle" opacity="0.5">EPOCH 35</text>

  <!-- Team zone: Orange -->
  <circle cx="1000" cy="200" r="95" fill="#ff6600" opacity="0.06" stroke="#ff6600" stroke-width="2.5" stroke-opacity="0.3"/>
  <text x="1000" y="195" fill="#ff6600" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" opacity="0.8">ORANGE</text>
  <text x="1000" y="210" fill="#ff6600" font-family="sans-serif" font-size="8" text-anchor="middle" opacity="0.5">EPOCH 40</text>

  <!-- Food particles -->
  <circle cx="150" cy="150" r="4" fill="#ffaa44" opacity="0.8"/>
  <circle cx="500" cy="300" r="3.5" fill="#ff6644" opacity="0.8"/>
  <rect x="395" y="147" width="9" height="9" rx="1" fill="#44ffaa" opacity="0.7"/>
  <rect x="696" y="596" width="8" height="8" rx="1" fill="#ff44cc" opacity="0.7"/>
  <rect x="1048" y="448" width="7" height="7" rx="1" fill="#44aaff" opacity="0.7"/>
  <circle cx="750" cy="150" r="3" fill="#ffcc44" opacity="0.7"/>
  <polygon points="480,480 488,488 484,496 476,488" fill="#ff4488" opacity="0.7"/>
  <polygon points="850,320 858,328 854,336 846,328" fill="#44ffcc" opacity="0.7"/>
  <polygon points="120,380 128,388 124,396 116,388" fill="#ff8844" opacity="0.7"/>
  <circle cx="320" cy="450" r="3" fill="#ff4488" opacity="0.8"/>
  <circle cx="680" cy="420" r="2.5" fill="#ffaa44" opacity="0.7"/>
  <circle cx="550" cy="550" r="3" fill="#44ffaa" opacity="0.6"/>
  <rect x="247" y="347" width="6" height="6" rx="1" fill="#ffcc44" opacity="0.6"/>
  <polygon points="750,650 756,656 753,662 747,656" fill="#44aaff" opacity="0.6"/>

  <!-- Growth food with star -->
  <circle cx="700" cy="250" r="8" fill="#ffcc00" opacity="0.8" filter="url(#g1)"/>
  <text x="700" y="253" fill="#000" font-family="sans-serif" font-size="8" text-anchor="middle">✦</text>

  <!-- Dead food "✕" -->
  <circle cx="450" cy="400" r="5" fill="#ff3366" opacity="0.5"/>
  <text x="450" y="403" fill="#000" font-family="sans-serif" font-size="7" text-anchor="middle" opacity="0.7">✕</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- WORM 1: RED team, moving right-up -->
  <!-- ════════════════════════════════════════════ -->
  <g>
    <!-- Tail segments (drawn back-to-front) -->
    <circle cx="326" cy="282" r="5.5" fill="#ff003c" opacity="0.6"/>
    <circle cx="334" cy="276" r="6.0" fill="#ff003c" opacity="0.7"/>
    <circle cx="343" cy="269" r="6.5" fill="#ff1a3c" opacity="0.8"/>
    <circle cx="353" cy="261" r="7.0" fill="#ff1a3c" opacity="0.85"/>
    <circle cx="364" cy="252" r="7.5" fill="#ff263c" opacity="0.9"/>
    <circle cx="376" cy="242" r="8.0" fill="#ff323c" opacity="0.95"/>
    <circle cx="389" cy="231" r="8.5" fill="#ff3c3c" opacity="0.95"/>
    <!-- Head -->
    <circle cx="403" cy="219" r="12" fill="#ff4a4a"/>
    <circle cx="403" cy="219" r="12" fill="url(#eyeG)" opacity="0.15"/>
    <!-- Eyes -->
    <circle cx="408" cy="212" r="3.5" fill="#fff"/>
    <circle cx="408" cy="212" r="1.5" fill="#111"/>
    <circle cx="398" cy="212" r="3.5" fill="#fff"/>
    <circle cx="398" cy="212" r="1.5" fill="#111"/>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- WORM 2: RED team, second worm -->
  <!-- ════════════════════════════════════════════ -->
  <g>
    <circle cx="260" cy="180" r="4.5" fill="#ff003c" opacity="0.5"/>
    <circle cx="267" cy="173" r="5.0" fill="#ff003c" opacity="0.6"/>
    <circle cx="275" cy="165" r="5.5" fill="#ff1a3c" opacity="0.7"/>
    <circle cx="284" cy="156" r="6.0" fill="#ff1a3c" opacity="0.8"/>
    <circle cx="294" cy="146" r="6.5" fill="#ff263c" opacity="0.85"/>
    <circle cx="305" cy="135" r="7.0" fill="#ff323c" opacity="0.9"/>
    <circle cx="305" cy="135" r="11" fill="#ff3c3c"/>
    <circle cx="305" cy="135" r="11" fill="url(#eyeG)" opacity="0.15"/>
    <circle cx="310" cy="128" r="3" fill="#fff"/>
    <circle cx="310" cy="128" r="1.3" fill="#111"/>
    <circle cx="300" cy="128" r="3" fill="#fff"/>
    <circle cx="300" cy="128" r="1.3" fill="#111"/>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- WORM 3: GREEN team, moving left -->
  <!-- ════════════════════════════════════════════ -->
  <g>
    <circle cx="988" cy="488" r="5.0" fill="#00ff88" opacity="0.55"/>
    <circle cx="980" cy="488" r="5.5" fill="#00ff88" opacity="0.65"/>
    <circle cx="971" cy="488" r="6.0" fill="#10ff88" opacity="0.75"/>
    <circle cx="961" cy="488" r="6.5" fill="#20ff88" opacity="0.8"/>
    <circle cx="950" cy="488" r="7.0" fill="#30ff88" opacity="0.85"/>
    <circle cx="938" cy="488" r="7.5" fill="#40ff88" opacity="0.9"/>
    <circle cx="925" cy="488" r="8.0" fill="#50ff88" opacity="0.95"/>
    <circle cx="911" cy="488" r="11" fill="#60ff88"/>
    <circle cx="911" cy="488" r="11" fill="url(#eyeG)" opacity="0.15"/>
    <circle cx="906" cy="483" r="3.2" fill="#fff"/>
    <circle cx="906" cy="483" r="1.4" fill="#111"/>
    <circle cx="906" cy="493" r="3.2" fill="#fff"/>
    <circle cx="906" cy="493" r="1.4" fill="#111"/>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- WORM 4: GREEN team, second, moving down -->
  <!-- ════════════════════════════════════════════ -->
  <g>
    <circle cx="840" cy="610" r="4.5" fill="#00ff88" opacity="0.5"/>
    <circle cx="840" cy="618" r="5.0" fill="#00ff88" opacity="0.6"/>
    <circle cx="840" cy="627" r="5.5" fill="#10ff88" opacity="0.7"/>
    <circle cx="840" cy="637" r="6.0" fill="#20ff88" opacity="0.8"/>
    <circle cx="840" cy="648" r="6.5" fill="#30ff88" opacity="0.85"/>
    <circle cx="840" cy="660" r="10" fill="#50ff88"/>
    <circle cx="840" cy="660" r="10" fill="url(#eyeG)" opacity="0.15"/>
    <circle cx="835" cy="665" r="3" fill="#fff"/>
    <circle cx="835" cy="665" r="1.3" fill="#111"/>
    <circle cx="845" cy="665" r="3" fill="#fff"/>
    <circle cx="845" cy="665" r="1.3" fill="#111"/>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- WORM 5: BLUE team, moving up-right -->
  <!-- ════════════════════════════════════════════ -->
  <g>
    <circle cx="165" cy="505" r="4.5" fill="#4488ff" opacity="0.5"/>
    <circle cx="170" cy="496" r="5.0" fill="#4488ff" opacity="0.6"/>
    <circle cx="176" cy="486" r="5.5" fill="#4488ff" opacity="0.7"/>
    <circle cx="183" cy="475" r="6.0" fill="#5599ff" opacity="0.8"/>
    <circle cx="191" cy="463" r="6.5" fill="#66aaff" opacity="0.85"/>
    <circle cx="200" cy="450" r="10" fill="#77bbff"/>
    <circle cx="200" cy="450" r="10" fill="url(#eyeG)" opacity="0.15"/>
    <circle cx="205" cy="444" r="3" fill="#fff"/>
    <circle cx="205" cy="444" r="1.3" fill="#111"/>
    <circle cx="196" cy="444" r="3" fill="#fff"/>
    <circle cx="196" cy="444" r="1.3" fill="#111"/>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- WORM 6: ORANGE team, moving left -->
  <!-- ════════════════════════════════════════════ -->
  <g>
    <circle cx="1060" cy="155" r="4.0" fill="#ff6600" opacity="0.5"/>
    <circle cx="1052" cy="155" r="4.5" fill="#ff6600" opacity="0.6"/>
    <circle cx="1043" cy="155" r="5.0" fill="#ff7700" opacity="0.7"/>
    <circle cx="1033" cy="155" r="5.5" fill="#ff8800" opacity="0.8"/>
    <circle cx="1022" cy="155" r="6.0" fill="#ff9900" opacity="0.85"/>
    <circle cx="1010" cy="155" r="9" fill="#ffaa00"/>
    <circle cx="1010" cy="155" r="9" fill="url(#eyeG)" opacity="0.15"/>
    <circle cx="1005" cy="150" r="2.8" fill="#fff"/>
    <circle cx="1005" cy="150" r="1.2" fill="#111"/>
    <circle cx="1005" cy="160" r="2.8" fill="#fff"/>
    <circle cx="1005" cy="160" r="1.2" fill="#111"/>
  </g>

  <!-- Sprint ring on worm 3 -->
  <circle cx="911" cy="488" r="16" fill="none" stroke="#fff" stroke-width="2" opacity="0.2"/>

  <!-- Camera transform indicator -->
  <rect x="540" y="340" width="120" height="30" rx="4" fill="#0a0a1a" stroke="#ff003c" stroke-width="0.5" opacity="0.5"/>
  <text x="600" y="358" text-anchor="middle" fill="#ff003c" font-family="sans-serif" font-size="11" font-weight="bold" opacity="0.8">AI EVOLUTION</text>

  <!-- HUD overlay -->
  <rect x="0" y="0" width="1200" height="32" fill="#050510" opacity="0.7"/>
  <text x="16" y="20" fill="#ff003c" font-family="monospace" font-size="11" font-weight="bold">SLITHER EVO</text>
  <text x="160" y="20" fill="#666" font-family="monospace" font-size="9">GEN 142</text>
  <text x="280" y="20" fill="#666" font-family="monospace" font-size="9">SPEED: 10×</text>
  <text x="400" y="20" fill="#666" font-family="monospace" font-size="9">ALIVE: 47/60</text>

  <rect x="0" y="720" width="1200" height="30" fill="#050510" opacity="0.5"/>
  <text x="16" y="738" fill="#888" font-family="monospace" font-size="9">FITNESS</text>
  <rect x="80" y="728" width="160" height="6" rx="2" fill="#1a1a1a"/>
  <rect x="80" y="728" width="120" height="6" rx="2" fill="#ff003c" opacity="0.7"/>
</svg>
