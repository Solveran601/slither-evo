<svg viewBox="0 0 800 500" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgG" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#000005"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowI"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="foodG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff003c"/><stop offset="100%" stop-color="#ff6b35"/></linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bgG)"/>

  <!-- Grid -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <rect width="30" height="30" fill="none" stroke="#ff003c" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="40" fill="#050510" opacity="0.8"/>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#ff003c" stroke-width="0.5" opacity="0.3"/>
  <text x="20" y="26" fill="#ff003c" font-family="monospace" font-size="12" font-weight="bold">SLITHER EVO v2</text>
  <text x="200" y="26" fill="#666" font-family="monospace" font-size="10">GEN 142</text>
  <text x="320" y="26" fill="#666" font-family="monospace" font-size="10">SPEED: 10×</text>
  <text x="460" y="26" fill="#666" font-family="monospace" font-size="10">MODE: FFA</text>
  <text x="620" y="26" fill="#ff003c" font-family="monospace" font-size="10">ALIVE: 47/60</text>

  <!-- Worms paths -->
  <path d="M 120 280 Q 200 200 280 240 Q 350 300 420 220 Q 500 150 580 200" fill="none" stroke="#ff003c" stroke-width="2" opacity="0.15"/>
  <path d="M 150 320 Q 250 380 350 300 Q 400 250 500 320" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.12"/>

  <!-- Worm 1 (red team) -->
  <circle cx="280" cy="240" r="8" fill="none" stroke="#ff003c" stroke-width="2" opacity="0.8" filter="url(#glow)"/>
  <circle cx="270" cy="235" r="4" fill="#ff003c" opacity="0.9"/>
  <circle cx="260" cy="230" r="3" fill="#ff003c" opacity="0.7"/>
  <circle cx="290" cy="245" r="4" fill="#ff003c" opacity="0.9"/>
  <circle cx="300" cy="250" r="3" fill="#ff003c" opacity="0.7"/>

  <!-- Worm 2 (green team) -->
  <circle cx="420" cy="220" r="7" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.8" filter="url(#glow)"/>
  <circle cx="410" cy="215" r="3.5" fill="#00ff88" opacity="0.9"/>
  <circle cx="400" cy="210" r="2.5" fill="#00ff88" opacity="0.7"/>
  <circle cx="430" cy="225" r="3.5" fill="#00ff88" opacity="0.9"/>
  <circle cx="440" cy="230" r="2.5" fill="#00ff88" opacity="0.7"/>

  <!-- Worm 3 -->
  <circle cx="580" cy="200" r="6" fill="none" stroke="#ff6600" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <circle cx="570" cy="196" r="3" fill="#ff6600" opacity="0.8"/>
  <circle cx="560" cy="192" r="2" fill="#ff6600" opacity="0.6"/>

  <!-- Worm 4 -->
  <circle cx="150" cy="320" r="6" fill="none" stroke="#00ccff" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <circle cx="140" cy="316" r="3" fill="#00ccff" opacity="0.8"/>

  <!-- Food particles -->
  <circle cx="350" cy="190" r="3" fill="url(#foodG)" filter="url(#glowI)"/>
  <circle cx="200" cy="350" r="2.5" fill="url(#foodG)" filter="url(#glowI)"/>
  <circle cx="500" cy="280" r="2" fill="url(#foodG)" filter="url(#glowI)"/>
  <circle cx="650" cy="180" r="2.5" fill="url(#foodG)" filter="url(#glowI)"/>
  <circle cx="100" cy="200" r="2" fill="url(#foodG)" filter="url(#glowI)"/>
  <circle cx="450" cy="150" r="2" fill="url(#foodG)" filter="url(#glowI)"/>
  <circle cx="300" cy="350" r="2.5" fill="url(#foodG)" filter="url(#glowI)"/>
  <circle cx="550" cy="350" r="2" fill="url(#foodG)" filter="url(#glowI)"/>

  <!-- Bottom panel -->
  <rect x="0" y="460" width="800" height="40" fill="#050510" opacity="0.8"/>
  <line x1="0" y1="460" x2="800" y2="460" stroke="#ff003c" stroke-width="0.5" opacity="0.3"/>

  <!-- Fitness bars -->
  <text x="20" y="485" fill="#888" font-family="monospace" font-size="9">RED</text>
  <rect x="60" y="475" width="120" height="8" fill="#1a1a1a" rx="2"/>
  <rect x="60" y="475" width="85" height="8" fill="#ff003c" rx="2" opacity="0.8"/>

  <text x="200" y="485" fill="#888" font-family="monospace" font-size="9">GREEN</text>
  <rect x="260" y="475" width="120" height="8" fill="#1a1a1a" rx="2"/>
  <rect x="260" y="475" width="62" height="8" fill="#00ff88" rx="2" opacity="0.8"/>

  <text x="410" y="485" fill="#888" font-family="monospace" font-size="9">ORANGE</text>
  <rect x="470" y="475" width="120" height="8" fill="#1a1a1a" rx="2"/>
  <rect x="470" y="475" width="45" height="8" fill="#ff6600" rx="2" opacity="0.8"/>

  <text x="620" y="485" fill="#888" font-family="monospace" font-size="9">BLUE</text>
  <rect x="660" y="475" width="120" height="8" fill="#1a1a1a" rx="2"/>
  <rect x="660" y="475" width="30" height="8" fill="#00ccff" rx="2" opacity="0.8"/>

  <!-- Overlay title -->
  <rect x="250" y="110" width="300" height="50" rx="8" fill="#050510" stroke="#ff003c" stroke-width="0.5" opacity="0.7"/>
  <text x="400" y="140" text-anchor="middle" fill="#ff003c" font-family="monospace" font-size="18" font-weight="bold" filter="url(#glowI)">AI EVOLUTION</text>

  <!-- Scanline effect -->
  <line x1="0" y1="120" x2="800" y2="120" stroke="#ff003c" stroke-width="0.5" opacity="0.08">
    <animate attributeName="y1" values="0;500;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;500;0" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>
