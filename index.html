const cv=document.getElementById('c'),cx=cv.getContext('2d')
function resize(){Wc=window.innerWidth;Hc=window.innerHeight;cv.width=Wc;cv.height=Hc}
resize();window.addEventListener('resize',resize)

const cam={x:W/2,y:H/2,zoom:.12,tx:W/2,ty:H/2,tzoom:.12,spectate:null}
let drag={d:false,lx:0,ly:0}
cv.addEventListener('mousedown',e=>{
  if(e.button===2){cam.tx=cam.x;cam.ty=cam.y;cam.spectate=null;return}
  drag.d=true;drag.lx=e.clientX;drag.ly=e.clientY;cv.style.cursor='grabbing'
})
window.addEventListener('mousemove',e=>{if(!drag.d)return;cam.tx-=(e.clientX-drag.lx)/cam.tzoom;cam.ty-=(e.clientY-drag.ly)/cam.tzoom;drag.lx=e.clientX;drag.ly=e.clientY})
window.addEventListener('mouseup',()=>{drag.d=false;cv.style.cursor='grab'})
cv.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY>0?.88:1.12;cam.tzoom=Math.max(.008,Math.min(2.5,cam.tzoom*f))},{passive:false})
cv.addEventListener('contextmenu',e=>e.preventDefault())
cv.addEventListener('click',e=>{
  if(drag.d)return
  const mx=(e.clientX-Wc/2)/cam.zoom+cam.x,my=(e.clientY-Hc/2)/cam.zoom+cam.y

  for(const w of worms){if(!w.alive)continue;const d=Math.hypot(w.seg[0].x-mx,w.seg[0].y-my);if(d<cd&&d<HR*wormSize(w.mass)*5){cd=d;closest=w}}
  if(closest)showWormInfo(closest);else hideWormInfo()
})
cv.addEventListener('touchstart',e=>{if(e.touches.length===1){drag.d=true;drag.lx=e.touches[0].clientX;drag.ly=e.touches[0].clientY}})

// SPACE to sprint spectated worm
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&cam.spectate!==null){e.preventDefault();const w=worms.find(x=>x.uid===cam.spectate);if(w&&w.alive)w.playerSprint=true}
})
document.addEventListener('keyup',e=>{
  if(e.code==='Space'){const w=worms.find(x=>x.uid===cam.spectate);if(w)w.playerSprint=false}
})

// ═══════════════════════════════════════════════════════════════════
// SPATIAL HASH
// ═══════════════════════════════════════════════════════════════════
const grid={cells:[],clr(){this.cells=[];for(let i=0;i<GRID*GRID;i++)this.cells[i]=[]},
  key(x,y){const gx=Math.max(0,Math.min(GRID-1,Math.floor(x/CELL))),gy=Math.max(0,Math.min(GRID-1,Math.floor(y/CELL)));return gx+','+gy},
  add(x,y,o){const k=this.key(x,y);const c=this.cells[k];if(c){c.push(o)}else{this.cells[k]=[o]}},
  get(x,y,r){const res=[],mx=Math.floor((x-r)/CELL),Mx=Math.floor((x+r)/CELL),my=Math.floor((y-r)/CELL),My=Math.floor((y+r)/CELL)
    for(let gx=mx;gx<=Mx;gx++)for(let gy=my;gy<=My;gy++){const k=gx+','+gy;if(this.cells[k])res.push(...this.cells[k])}return res}
}

// ═══════════════════════════════════════════════════════════════════
// OBSTACLES
// ═══════════════════════════════════════════════════════════════════
let obstacles=[]

// ═══════════════════════════════════════════════════════════════════
// NN — 44->30->22->16->4
// ═══════════════════════════════════════════════════════════════════
function nnF(w,inp){
  const tn=x=>x>100?1:x<-100?-1:x/(1+Math.abs(x))
  let off=0
  function layer(nIn,nOut){
    const out=new Float64Array(nOut)
    for(let j=0;j<nOut;j++){
      let s=w[off+nIn*nOut+j]
      for(let i=0;i<nIn;i++)s+=inp[i]*w[off+j*nIn+i]
      out[j]=tn(s)
    }
    off+=nIn*nOut+nOut
    return out
  }
  const h1=layer(N_INPUT,N_HIDDEN1);inp=h1
  const h2=layer(N_HIDDEN1,N_HIDDEN2);inp=h2
  const h3=layer(N_HIDDEN2,N_HIDDEN3);inp=h3
  const out=layer(N_HIDDEN3,N_OUTPUT)
  return{
    turn:out[0],
    boost:Math.max(0,Math.min(1,(out[1]+1)/2)),
    behavior2:out[2],
    behavior3:out[3],
  }
}
function rW(){const w=new Float64Array(WC);for(let i=0;i<WC;i++)w[i]=(Math.random()-.5)*2;return w}

// ═══════════════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════════════
let particles=[]
function spawnParticles(x,y,color,count,spd,life){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=spd*(.5+Math.random())
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:life||.6,ml:life||.6,sz:.5+Math.random()*2.5,c:color})
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.l-=dt
    if(p.l<=0)particles.splice(i,1)
  }
}
function drawParticles(){
  for(const p of particles){
    const s=ws(p.x,p.y);if(s.x<-20||s.x>Wc+20||s.y<-20||s.y>Hc+20)continue
    const a=Math.max(0,p.l/p.ml),sz=Math.max(.5,p.sz*a*cam.zoom*2.5)
    cx.globalAlpha=a*.7;cx.fillStyle=p.c;cx.beginPath();cx.arc(s.x,s.y,sz,0,Math.PI*2);cx.fill()
  }
  cx.globalAlpha=1
}

// ═══════════════════════════════════════════════════════════════════
// PERCEPTION — 8 RAYS x 5 LAYERS
// ═══════════════════════════════════════════════════════════════════
const N_RAYS=8
const RAY_ANGLES=[0,1,2,3,4,5,6,7].map(i=>i*Math.PI/4)
const RAY_RANGES=[50,150,300,500,800]
const RAY_RANGE_MAX=RAY_RANGES[RAY_RANGES.length-1]

// Check if a point is inside any wall obstacle
function pointInWall(px,py,r){
  r=r||0
  for(const o of obstacles){
    if(o.type==='wall'){
      const{x1,y1,x2,y2,thickness:t}=o
      const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)
      if(len<0.1)continue
      const t1=((px-x1)*dx+(py-y1)*dy)/(len*len)
      if(t1<0||t1>1)continue
      const ppx=x1+t1*dx,ppy=y1+t1*dy
      const d=Math.abs((py-y1)*dx-(px-x1)*dy)/len
      if(d<t/2+r)return true
    }else if(o.type==='block'){
      const d=Math.hypot(px-o.x,py-o.y)
      if(d<o.radius+r)return true
    }
  }
  return false
}

function rayObstacleHit(x,y,angle,maxDist,wormR){
  wormR=wormR||0
  const steps=Math.ceil(maxDist/20)
  for(let i=1;i<=steps;i++){
    const d=i*20,px=x+Math.cos(angle)*d,py=y+Math.sin(angle)*d
    if(px<wormR||px>=W-wormR||py<wormR||py>=H-wormR)return d
    if(pointInWall(px,py,wormR))return d
  }
  return maxDist
}

function raycastLayer(x,y,angle,range,findType,self){
  const endX=x+Math.cos(angle)*range,endY=y+Math.sin(angle)*range
  const steps=Math.ceil(range/15)
  let bestObj=null,bestDist=range*2

  if(findType==='wall'){
    const d=rayObstacleHit(x,y,angle,range)
    return{dist:d,val:d<range?1:0}
  }

  for(let i=1;i<=steps;i++){
    const frac=i/steps
    const px=x+(endX-x)*frac,py=y+(endY-y)*frac
    const items=grid.get(px,py,20)
    for(const item of items){
      if(findType==='food'&&item.r!==undefined&&!item.w){
        const d=Math.hypot(px-item.x,py-item.y)
        if(d<bestDist&&d<range){bestDist=d;bestObj=item}
      }else if(findType==='ally'&&item.w&&item.w!==self){
        if(gameMode==='ffa'){bestDist=Math.min(bestDist,Math.hypot(px-item.x,py-item.y))}
        else if(item.w.team===self.team){bestDist=Math.min(bestDist,Math.hypot(px-item.x,py-item.y))}
      }else if(findType==='enemy'&&item.w&&item.w!==self){
        if(gameMode==='ffa'){bestDist=Math.min(bestDist,Math.hypot(px-item.x,py-item.y))}
        else if(item.w.team!==self.team){bestDist=Math.min(bestDist,Math.hypot(px-item.x,py-item.y))}
      }else if(findType==='size'&&item.w&&item.w!==self){
        if(bestDist>Math.hypot(px-item.x,py-item.y)){
          bestDist=Math.hypot(px-item.x,py-item.y)
          bestObj=item
        }
      }
    }
  }

  if(findType==='size'&&bestObj&&bestObj.w){
    return{dist:bestDist,val:Math.min(1,bestObj.w.mass/80)}
  }
  if(bestDist<range){
    return{dist:bestDist,val:1-bestDist/range}
  }
  return{dist:range,val:0}
}

function getRayInputs(worm){
  const h=worm.seg[0],wR=HR*wormSize(worm.mass)
  const inp=[]
  for(let ri=0;ri<N_RAYS;ri++){
    const angle=worm.angle+RAY_ANGLES[ri]-Math.PI/2
    for(let li=0;li<RAY_RANGES.length;li++){
      const range=RAY_RANGES[li]

      // Layer 0: Walls (nearest wall within range)
      let wallVal=0
      if(li===0){
        const d=rayObstacleHit(h.x,h.y,angle,range,wR)
        wallVal=d<range?1-range/d:0
      }

      // Layer 1: Food (nearest food within range)
      let foodVal=0
      if(li===1){
        const res=raycastLayer(h.x,h.y,angle,range,'food',worm)
        foodVal=res.val
      }

      // Layer 2: Ally (nearest ally within range)
      let allyVal=0
      if(li===2){
        const res=raycastLayer(h.x,h.y,angle,range,'ally',worm)
        allyVal=res.val
      }

      // Layer 3: Enemy (nearest enemy within range)
      let enemyVal=0
      if(li===3){
        const res=raycastLayer(h.x,h.y,angle,range,'enemy',worm)
        enemyVal=res.val
      }

      // Layer 4: Size/mass of nearest entity
      let sizeVal=0
      if(li===4){
        const res=raycastLayer(h.x,h.y,angle,range,'size',worm)
        sizeVal=res.val
      }

      let val=0
      if(li===0)val=wallVal
      else if(li===1)val=foodVal
      else if(li===2)val=allyVal
      else if(li===3)val=enemyVal
      else if(li===4)val=sizeVal
      inp.push(val)
    }
  }

  // Extra inputs
  inp.push(SPEED/6)
  inp.push(Math.min(1,worm.mass/80))
  inp.push(Math.min(1,worm.st/300))
  inp.push(worm.zones.inEnemy?1:0)

  return inp
}

// ZONES
// ═══════════════════════════════════════════════════════════════════
let zones={}
function genZones(){
  if(gameMode==='ffa'){zones={};return}
  const minDist=ZR*2.5,m=ZR+500
  zones={}
  for(let t=0;t<N_TEAMS;t++){
    let cx,cy,ok,att=0
    do{cx=m+Math.random()*(W-m*2);cy=m+Math.random()*(H-m*2);ok=true
      for(const z of Object.values(zones)){if(Math.hypot(cx-z.cx,cy-z.cy)<minDist){ok=false;break}}
      att++}while(!ok&&att<500)
    zones[t]={cx,cy,r:ZR}
  }
}

let foods=[],foodSpawnTick=0
function pickFoodType(){
  let best=0,bestDef=-Infinity
  for(let t=0;t<FTYPES.length;t++){
    const target=FOOD_COUNT*FTYPES[t].w/FTW
    const def=target-foodTypeCounts[t]+Math.random()*2
    if(def>bestDef){bestDef=def;best=t}
  }
  return best
}
function spawnFood(n){
  for(let i=0;i<n;i++){
    const t=pickFoodType()
    foods.push({x:Math.random()*W,y:Math.random()*H,r:3+Math.random()*2,t,phase:Math.random()*Math.PI*2})
    foodTypeCounts[t]++
  }
}
function tickFood(){
  foodSpawnTick++
  if(foodSpawnTick%5===0&&foods.length<FOOD_COUNT*0.9)spawnFood(2)
  else if(foodSpawnTick%15===0&&foods.length<FOOD_COUNT)spawnFood(1)
  for(let i=foods.length-1;i>=0;i--){
    const f=foods[i]
    if(f.wallDeath&&fc-f.deathTick>600){
      if(f.t!==undefined)foodTypeCounts[f.t]--
      foods.splice(i,1)
    }
  }
}
function clearFood(){foods=[];foodTypeCounts=new Array(FTYPES.length).fill(0)}

// WORM
// ═══════════════════════════════════════════════════════════════════
let wormIdCounter=0,teamDead=[],needsEvo=false,deadWormsStats=[]

function wormSize(mass){return Math.min(3,1+(mass-1)*0.025)}
class Worm{
  constructor(team,id,wg,modelIdx){
    this.team=team;this.id=id;this.uid=wormIdCounter++;this.alive=true
    this.mass=1;this.st=0;this.kills=0;this.foodEaten=0;this.distTraveled=0;this.score=0
    this.wg=wg;this.modelIdx=modelIdx===undefined?Math.floor(Math.random()*MPT):modelIdx
    this.name=`${TN[team]}-${id+1}`
    this.c=CN[team]
    this.x=Math.random()*W;this.y=Math.random()*H;this.angle=Math.random()*Math.PI*2
    this.sprinting=false;this.playerSprint=false
    this.zones={inTeam:false,inEnemy:false}
    this.seg=[];for(let i=0;i<INIT_SEG;i++)this.seg.push({x:this.x,y:this.y})
    this.effects={};this.lastFoodTick=0;this.hunger=0;this.killsInEffect=0

    // Tracking stats for fitness
    this.peakMass=1;this.wallDeath=false;this.zoneTime=0;this.sprintTime=0

    // Behavior tracking for NN usage chart
    this.behaviorLog={sprint:0,eat:0,kill:0,idle:0,explore:0}
    this.behaviorTicks=0
  }

  recordBehavior(type){
    this.behaviorLog[type]=(this.behaviorLog[type]||0)+1
    this.behaviorTicks++
  }

  think(){
    if(!this.alive)return
    const inp=getRayInputs(this)
    const out=nnF(this.wg,inp)
    let turn=out.turn
    if(this.effects['curse'])turn=-turn

    // Determine behavior for stats
    const targetFoodAngle=inp[5]  // food direction from ray 0 layer 1
    const targetEnemyDist=inp[15] // enemy distance from ray 0 layer 3

    if(this.playerSprint){
      this.sprinting=true
    }else{
      this.sprinting=out.boost>0.6
      if(this.sprinting&&this.mass<2)this.sprinting=false
    }

    if(this.sprinting){this.recordBehavior('sprint')}
    else if(targetFoodAngle>0.3&&turn<0.3)this.recordBehavior('eat')
    else if(targetEnemyDist<0.5&&turn>0.3)this.recordBehavior('kill')
    else if(this.distTraveled>this.st*SPEED*0.3||this.distTraveled>100)this.recordBehavior('explore')
    else this.recordBehavior('idle')

    const tRate=0.07/wormSize(this.mass)
    this.angle+=turn*tRate
    this.angle=((this.angle%(Math.PI*2))+Math.PI*2)%(Math.PI*2)
  }

  update(){
    if(!this.alive)return
    this.st+=1/60;this.hunger+=1/60
    this.peakMass=Math.max(this.peakMass,this.mass)
    if(this.sprinting)this.sprintTime+=1/60
    for(const type in this.effects){
      this.effects[type]-=1/60
      if(this.effects[type]<=0)delete this.effects[type]
    }
    if(this.effects['mass_regen'])this.mass+=.03*(1/60)
    if(this.effects['poison']){this.mass-=.04*(1/60);if(this.mass<1)this.mass=1}

    const wSz=wormSize(this.mass),hs=HR*wSz,ss=SR*wSz
    let spd=(this.sprinting?SPRINT_SPEED:SPEED)/(1+(wSz-1)*0.35)
    if(this.effects['speed'])spd*=2.5
    let nx=this.seg[0].x+Math.cos(this.angle)*spd
    let ny=this.seg[0].y+Math.sin(this.angle)*spd
    this.distTraveled+=Math.hypot(nx-this.seg[0].x,ny-this.seg[0].y)

    // Wall collision (uses head radius for realistic edge contact)
    if(nx<hs||nx>W-hs||ny<hs||ny>H-hs){this.wallDeath=true;this.die(true);return}

    // Obstacle wall collision
    if(pointInWall(nx,ny,hs)){
      const angled=this.angle+Math.PI/2
      nx=this.seg[0].x+Math.cos(angled)*spd*.5
      ny=this.seg[0].y+Math.sin(angled)*spd*.5
      if(pointInWall(nx,ny,hs)){this.die();return}
    }

    this.zones={inTeam:false,inEnemy:false}
    if(gameMode!=='ffa'){
      for(const[t,z]of Object.entries(zones)){
        const dx=nx-z.cx,dy=ny-z.cy
        if(dx*dx+dy*dy<=z.r*z.r){
          if(parseInt(t)===this.team)this.zones.inTeam=true
          else if(!this.effects['invulnerable']){this.zones.inEnemy=true;this.zoneTime+=1/60;this.mass-=ZD*2*(1/60);if(this.mass<=0){this.die();return}}
        }
      }
    }

    if(this.sprinting){
      const sprintCost=SPRINT_MC*2*(1/60)
      this.mass-=sprintCost
      if(this.mass<1)this.mass=1
    }

    const n=grid.get(nx,ny,hs*2)
    for(const s of n){
      if(!s.w||s.w===this)continue
      const sameTeam=s.w.team===this.team
      if(sameTeam&&!this.effects['team_kill']&&!s.w.effects['team_kill'])continue
      if(gameMode!=='ffa'&&sameTeam)continue
      const dx=nx-s.x,dy=ny-s.y
      if(dx*dx+dy*dy<(hs+ss)*(hs+ss)){
        if(this.effects['invulnerable']){this.die();return}
        if(this.effects['shield']){this.die();s.w.die();return}
        this.die()
        if(!s.w.effects['invulnerable']){s.w.mass+=this.mass*.3;s.w.kills++;s.w.score+=8}
        if(this.effects['berserk'])this.killsInEffect++
        this.recordBehavior('kill')
        return
      }
    }

    this.seg.unshift({x:nx,y:ny})
    for(let i=foods.length-1;i>=0;i--){
      const f=foods[i],dx=nx-f.x,dy=ny-f.y
      if(dx*dx+dy*dy<hs*hs){
        if(f.noReward){
          if(f.t!==undefined&&f.t<FTYPES.length)foodTypeCounts[f.t]--
          foods.splice(i,1)
          continue
        }
        const ft=f.t!==undefined&&f.t<FTYPES.length?FTYPES[f.t]:FTYPES[0]
        if(ft.fx&&EFFECT_DUR[ft.fx]){
          const dur=EFFECT_DUR[ft.fx]
          if(this.effects[ft.fx])this.effects[ft.fx]=Math.max(this.effects[ft.fx],dur)
          else this.effects[ft.fx]=dur
          spawnParticles(nx,ny,ft.c,8,2,.6)
        }else{
          if(ft.mass>0){
            this.foodEaten++
            this.score+=1
          }
          this.mass+=ft.mass
          if(this.mass<1)this.mass=1
          if(ft.effect==='growth'){this.mass*=2;const tl=Math.floor(INIT_SEG+Math.min(this.mass*2.5,200));while(this.seg.length<tl)this.seg.push({x:this.seg[this.seg.length-1].x,y:this.seg[this.seg.length-1].y})}
          spawnParticles(nx,ny,ft.c,6,1.2,.4)
        }
        if(f.t!==undefined&&f.t<FTYPES.length)foodTypeCounts[f.t]--
        this.lastFoodTick=this.st;this.hunger=0
        foods.splice(i,1)
      }
    }

    if(this.sprinting&&fc%18===0&&this.mass>2){
      const bx=this.seg[this.seg.length-1]||this.seg[0]
      const dt=pickFoodType();foods.push({x:bx.x+(Math.random()-.5)*5,y:bx.y+(Math.random()-.5)*5,r:3,t:dt,phase:Math.random()*Math.PI*2,noReward:true});foodTypeCounts[dt]++
    }

    const tl=Math.floor(INIT_SEG+Math.min(this.mass*2.5,200))
    while(this.seg.length>tl)this.seg.pop()
    while(this.seg.length<tl)this.seg.push({x:this.seg[this.seg.length-1].x,y:this.seg[this.seg.length-1].y})
  }

  die(fromWall){
    if(this.effects['invulnerable'])return
    deadWormsStats.push({
      team:this.team,id:this.id,modelId:this.modelIdx,
      mass:this.mass,survivalTime:this.st,kills:this.kills,
      foodEaten:this.foodEaten,distanceTraveled:this.distTraveled,
      wallDeath:this.wallDeath,peakMass:this.peakMass,
      zoneTime:this.zoneTime,sprintTime:this.sprintTime
    })
    this.alive=false;teamDead[this.team]++
    // The configured team size can drift from the actual list of worms.
    // Respawn only when this team truly has no living members left.
    if(worms.length&&worms.every(w=>w.team!==this.team||!w.alive))eliminateTeam(this.team)
    const dieSz=wormSize(this.mass)
    spawnParticles(this.seg[0].x,this.seg[0].y,this.c,Math.floor(20*dieSz),4,1)
    const dropCount=Math.min(40,Math.floor(this.mass*5))
    for(let i=0;i<dropCount;i++){
      const dt=pickFoodType()
      const f={x:this.seg[0].x+(Math.random()-.5)*40,y:this.seg[0].y+(Math.random()-.5)*40,r:3+Math.random()*4,t:dt,phase:Math.random()*Math.PI*2}
      if(fromWall){f.wallDeath=true;f.deathTick=fc}
      foods.push(f);foodTypeCounts[dt]++
    }
  }

  reset(wg,modelIdx){
    this.alive=true;this.mass=1;this.st=0;this.kills=0;this.foodEaten=0;this.distTraveled=0;this.score=0
    this.sprinting=false;this.playerSprint=false;this.effects={};this.hunger=0;this.killsInEffect=0
    this.wg=wg;this.modelIdx=modelIdx===undefined?Math.floor(Math.random()*MPT):modelIdx
    this.x=Math.random()*W;this.y=Math.random()*H;this.angle=Math.random()*Math.PI*2
    this.seg=[];for(let i=0;i<INIT_SEG;i++)this.seg.push({x:this.x,y:this.y})
    this.peakMass=1;this.wallDeath=false;this.zoneTime=0;this.sprintTime=0
    this.behaviorLog={sprint:0,eat:0,kill:0,idle:0,explore:0};this.behaviorTicks=0
  }
}

let selectedWorm=null

function showWormInfo(w){
  selectedWorm=w
  const panel=document.getElementById('worm-info')
  panel.classList.add('open')
  updateWormInfo()
}

function hideWormInfo(){
  selectedWorm=null
  document.getElementById('worm-info').classList.remove('open')
}

function updateWormInfo(){
  const w=selectedWorm
  if(!w||!w.alive){hideWormInfo();return}
  const panel=document.getElementById('worm-info')
  const col='#'+w.c.toString(16).padStart(6,'0')

  const bt=w.behaviorTicks||1
  const sprintP=((w.behaviorLog.sprint||0)/bt*100).toFixed(0)
  const eatP=((w.behaviorLog.eat||0)/bt*100).toFixed(0)
  const killP=((w.behaviorLog.kill||0)/bt*100).toFixed(0)
  const exploreP=((w.behaviorLog.explore||0)/bt*100).toFixed(0)
  const idleP=((w.behaviorLog.idle||0)/bt*100).toFixed(0)

  // Model fitness history (try team history, fallback to global)
  let mh=modelFitnessHistory[w.team]||[]
  if(mh.length<2)mh=fitData||[]
  const mf=modelFitness[w.team]||{}
  const thisF=mf[w.modelIdx]!==undefined?mf[w.modelIdx]:null

  let graphHtml=''
  if(mh.length>1){
    graphHtml=`<div class=wi-graph><canvas id=wi-g-canvas width=260 height=50></canvas></div>`
  }

  const peakFit=mh.length>1?Math.max(...mh.filter(v=>v!==null&&v!==undefined)):null

  panel.innerHTML=`
    <div class=wi-hdr>
      <span style=color:${col}>${w.name}</span>
      <span class=wi-close onclick="hideWormInfo()">✕</span>
    </div>
    <div class=wi-row><span class=wl>Mass</span><span class=wv>${w.mass.toFixed(1)}</span></div>
    <div class=wi-row><span class=wl>Score</span><span class=wv style=color:#ffd700>${Math.floor(w.score)}</span></div>
    <div class=wi-row><span class=wl>Kills</span><span class=wv>${w.kills}</span></div>
    <div class=wi-row><span class=wl>Food</span><span class=wv>${w.foodEaten}</span></div>
    <div class=wi-row><span class=wl>Survival</span><span class=wv>${w.st.toFixed(0)}s</span></div>
    <div class=wi-row><span class=wl>Distance</span><span class=wv>${Math.floor(w.distTraveled)}</span></div>
    <div class=wi-row><span class=wl>Model #${w.modelIdx}</span><span class=wv style=color:${thisF!==null?'#ffd700':'#666'}>${thisF!==null?'fit: '+thisF.toFixed(1):'—'}</span></div>
    <div style=margin-top:6px;font-size:9px;color:#888>Neural Network Activity</div>
    <div class=wi-nn-bar>
      <div style="width:${sprintP}%;background:#ffdd33;height:100%;float:left"></div>
      <div style="width:${eatP}%;background:#44ee55;height:100%;float:left"></div>
      <div style="width:${killP}%;background:#ff4455;height:100%;float:left"></div>
      <div style="width:${exploreP}%;background:#44aaff;height:100%;float:left"></div>
      <div style="width:${idleP}%;background:#555;height:100%;float:left"></div>
    </div>
    <div class=wi-nn-legend>
      <span><span class=wl-dot style=background:#ffdd33></span>Sprint ${sprintP}%</span>
      <span><span class=wl-dot style=background:#44ee55></span>Eat ${eatP}%</span>
      <span><span class=wl-dot style=background:#ff4455></span>Fight ${killP}%</span>
      <span><span class=wl-dot style=background:#44aaff></span>Explore ${exploreP}%</span>
      <span><span class=wl-dot style=background:#555></span>Idle ${idleP}%</span>
    </div>
    ${graphHtml}
    <div style=font-size:7px;color:#444;margin-top:2px>Data: ${mh.length} pts · peak: ${peakFit!==null?peakFit.toFixed(1):'—'}</div>
  `

  // Draw fitness mini-graph
  if(mh.length>1){
    const gcv=document.getElementById('wi-g-canvas')
    if(gcv){
      const gctx=gcv.getContext('2d')
      const gw=gcv.width,gh=gcv.height
      gctx.clearRect(0,0,gw,gh)
      gctx.fillStyle='rgba(0,0,0,0.3)';gctx.fillRect(0,0,gw,gh)
      const data=mh.filter(v=>v!==null&&v!==undefined)
      if(data.length>1){
        const maxV=Math.max(...data,1),minV=Math.min(...data,0),rg=maxV-minV||1
        gctx.beginPath()
        for(let i=0;i<data.length;i++){
          const x=(i/(data.length-1||1))*gw,y=gh-(data[i]-minV)/rg*gh
          i===0?gctx.moveTo(x,y):gctx.lineTo(x,y)
        }
        gctx.strokeStyle=col;gctx.lineWidth=1.5;gctx.stroke()

        // Peak/last markers
        const peakIdx=data.indexOf(Math.max(...data))
        const lastIdx=data.length-1
        for(const idx of[peakIdx,lastIdx]){
          const x=(idx/(data.length-1||1))*gw,y=gh-(data[idx]-minV)/rg*gh
          gctx.fillStyle=idx===peakIdx?'#44ff88':'#fff'
          gctx.beginPath();gctx.arc(x,y,3,0,Math.PI*2);gctx.fill()
        }

        // Horizontal line at median
        const med=(minV+maxV)/2
        const medY=gh-(med-minV)/rg*gh
        gctx.strokeStyle='rgba(255,255,255,0.06)';gctx.lineWidth=0.5
        gctx.setLineDash([2,3]);gctx.beginPath();gctx.moveTo(0,medY);gctx.lineTo(gw,medY);gctx.stroke();gctx.setLineDash([])
      }
    }
  }
}

function ws(x,y){return{x:(x-cam.x)*cam.zoom+Wc/2,y:(y-cam.y)*cam.zoom+Hc/2}}

function render(){
  cx.fillStyle='#0a0a15';cx.fillRect(0,0,Wc,Hc)

  // Stars
  if(typeof stars==='undefined'){window.stars=[];for(let i=0;i<300;i++)stars.push({x:Math.random()*Wc*2-Wc*.5,y:Math.random()*Hc*2-Hc*.5,s:.3+Math.random()*1,b:.2+Math.random()*.8,p:Math.random()*Math.PI*2})}
  for(const st of stars){
    const twinkle=.6+.4*Math.sin(fc*.03+st.p)
    cx.fillStyle=`rgba(255,255,255,${(st.b*twinkle)*.3+.1})`;cx.fillRect(st.x,st.y,st.s,st.s)
  }

  // Obstacles
  for(const o of obstacles){
    if(o.type==='wall'){
      const s=ws(o.x1,o.y1),e=ws(o.x2,o.y2)
      cx.strokeStyle='#1a1a3a';cx.lineWidth=Math.max(1,o.thickness*cam.zoom)
      cx.beginPath();cx.moveTo(s.x,s.y);cx.lineTo(e.x,e.y);cx.stroke()
      cx.strokeStyle='rgba(30,30,60,0.3)';cx.lineWidth=Math.max(1,o.thickness*cam.zoom+4)
      cx.beginPath();cx.moveTo(s.x,s.y);cx.lineTo(e.x,e.y);cx.stroke()
    }else if(o.type==='block'){
      const s=ws(o.x,o.y),r=o.radius*cam.zoom
      if(s.x<-r-50||s.x>Wc+r+50||s.y<-r-50||s.y>Hc+r+50)continue
      const gr=cx.createRadialGradient(s.x-r*.2,s.y-r*.2,0,s.x,s.y,r)
      gr.addColorStop(0,'#1e1e3e');gr.addColorStop(1,'#0a0a1e')
      cx.fillStyle=gr;cx.beginPath();cx.arc(s.x,s.y,r,0,Math.PI*2);cx.fill()
      cx.strokeStyle='#2a2a4a';cx.lineWidth=1.5;cx.beginPath();cx.arc(s.x,s.y,r,0,Math.PI*2);cx.stroke()
    }
  }

  // Zones
  const pulse=.7+.3*Math.sin(fc*.02)
  for(const[t,z]of Object.entries(zones)){
    const c=ws(z.cx,z.cy),r=z.r*cam.zoom
    if(c.x<-r-100||c.x>Wc+r+100||c.y<-r-100||c.y>Hc+r+100)continue
    cx.beginPath();cx.arc(c.x,c.y,r,0,Math.PI*2)
    cx.fillStyle=(TC[t]||'#444')+'08';cx.fill()
    cx.strokeStyle=(TC[t]||'#444')+Math.floor(40*pulse).toString(16).padStart(2,'0');cx.lineWidth=2.5;cx.stroke()
    if(gameMode!=='ffa'){
      cx.fillStyle='#ffffff20';cx.font='bold 9px sans-serif';cx.textAlign='center'
      cx.fillText(TN[t]||'',c.x,c.y-5)
      cx.fillStyle='#ffffff10';cx.font='7px sans-serif'
      cx.fillText('EPOCH '+(teamEpochs[parseInt(t)]||0),c.x,c.y+8)
    }
  }

  // Grid
  const gs=1000
  const minX=Math.max(0,Math.floor((cam.x-Wc/2/cam.zoom)/gs)*gs)
  const maxX=Math.min(W,Math.ceil((cam.x+Wc/2/cam.zoom)/gs)*gs)
  const minY=Math.max(0,Math.floor((cam.y-Hc/2/cam.zoom)/gs)*gs)
  const maxY=Math.min(H,Math.ceil((cam.y+Hc/2/cam.zoom)/gs)*gs)
  cx.strokeStyle='#0d0d20';cx.lineWidth=.5
  for(let x=minX;x<=maxX;x+=gs){const s=ws(x,minY),e=ws(x,maxY);cx.beginPath();cx.moveTo(s.x,s.y);cx.lineTo(e.x,e.y);cx.stroke()}
  for(let y=minY;y<=maxY;y+=gs){const s=ws(minX,y),e=ws(maxX,y);cx.beginPath();cx.moveTo(s.x,s.y);cx.lineTo(e.x,e.y);cx.stroke()}

  const tl=ws(0,0),br=ws(W,H)
  cx.strokeStyle='#1a1a3a';cx.lineWidth=2;cx.strokeRect(tl.x,tl.y,br.x-tl.x,br.y-tl.y)

  // Food
  for(const f of foods){
    const s=ws(f.x,f.y)
    if(s.x<-10||s.x>Wc+10||s.y<-10||s.y>Hc+10)continue
    const ft=f.t!==undefined&&f.t<FTYPES.length?FTYPES[f.t]:FTYPES[0]
    const sz=Math.max(1,f.r*cam.zoom*(.8+Math.abs(ft.mass)*1.8))
    const pulseF=.9+.1*Math.sin(fc*.05+(f.phase||0))
    cx.fillStyle=ft.c
    cx.globalAlpha=pulseF
    if(ft.fx){
      cx.beginPath();cx.arc(s.x,s.y,sz*pulseF,0,Math.PI*2);cx.fill()
      cx.strokeStyle='#fff';cx.globalAlpha=.2;cx.lineWidth=1;cx.beginPath();cx.arc(s.x,s.y,sz*1.3,0,Math.PI*2);cx.stroke()
    }else if(ft.mass<0){
      const r=Math.max(2,sz)
      cx.fillRect(s.x-r*.7,s.y-r*.7,r*1.4,r*1.4)
      cx.fillStyle='#000a';cx.font=(r)+'px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('✕',s.x,s.y+1)
    }else{
      cx.beginPath();cx.arc(s.x,s.y,sz*pulseF,0,Math.PI*2);cx.fill()
    }
    cx.globalAlpha=1
  }

  drawParticles()

  const spectateW=cam.spectate!==null?worms.find(w=>w.uid===cam.spectate):null

  // Sort worms by mass for proper layering
  const sortedWorms=[...worms].filter(w=>w.alive).sort((a,b)=>a.mass-b.mass)

  for(const w of sortedWorms){
    const h=ws(w.seg[0].x,w.seg[0].y)
    if(h.x<-300||h.x>Wc+300||h.y<-300||h.y>Hc+300)continue
    const col='#'+w.c.toString(16).padStart(6,'0')
    const cr=(w.c>>16)&255,cg=(w.c>>8)&255,cb=w.c&255
    const dark=`rgb(${Math.floor(cr*.2)},${Math.floor(cg*.2)},${Math.floor(cb*.2)})`
    const light=`rgb(${Math.min(255,cr+60)},${Math.min(255,cg+60)},${Math.min(255,cb+60)})`

    const wSize=wormSize(w.mass)
    const zMult=w.zones.inEnemy?1.3:w.zones.inTeam?1.15:1

    // Shadow beneath worm
    cx.globalAlpha=0.12
    for(let i=w.seg.length-1;i>=0;i--){
      const s=ws(w.seg[i].x+3,w.seg[i].y+3),sr=Math.max(1,((SR-(i/w.seg.length)*SR*0.3)*wSize*cam.zoom*zMult))
      cx.fillStyle='#000';cx.beginPath();cx.arc(s.x,s.y,sr,0,Math.PI*2);cx.fill()
    }
    const hShadow=ws(h.x+3,h.y+3),hSr=HR*wSize*cam.zoom*zMult
    cx.fillStyle='#000';cx.beginPath();cx.arc(hShadow.x,hShadow.y,hSr,0,Math.PI*2);cx.fill()
    cx.globalAlpha=1

    // Body segments with gradient and outline
    for(let i=w.seg.length-1;i>=0;i--){
      const s=ws(w.seg[i].x,w.seg[i].y),size=(SR-(i/w.seg.length)*SR*0.3)*wSize*cam.zoom*zMult
      const sr=Math.max(1,size)
      const alpha=.3+.7*(1-i/w.seg.length)
      cx.globalAlpha=alpha
      const gr=cx.createRadialGradient(s.x-sr*.25,s.y-sr*.25,0,s.x,s.y,sr)
      gr.addColorStop(0,light);gr.addColorStop(.4,col);gr.addColorStop(.85,col);gr.addColorStop(1,dark)
      cx.fillStyle=gr;cx.beginPath();cx.arc(s.x,s.y,sr,0,Math.PI*2);cx.fill()
      cx.strokeStyle=dark;cx.lineWidth=0.5;cx.stroke()
    }
    cx.globalAlpha=1

    // Head (slightly elongated for slither-like look)
    const hr=HR*wSize*cam.zoom*zMult
    const seg1=w.seg[1]||w.seg[0]
    const ea=Math.atan2(w.seg[0].y-seg1.y,w.seg[0].x-seg1.x)
    cx.save();cx.translate(h.x,h.y);cx.rotate(ea)
    const hg=cx.createRadialGradient(-hr*.1,-hr*.15,0,0,0,hr)
    hg.addColorStop(0,'#fff');hg.addColorStop(.08,light);hg.addColorStop(.45,col);hg.addColorStop(1,dark)
    cx.fillStyle=hg
    cx.beginPath();cx.ellipse(0,0,hr*1.15,hr,0,0,Math.PI*2);cx.fill()
    cx.strokeStyle=dark;cx.lineWidth=0.8;cx.stroke()
    cx.restore()

    // Sprint ring
    if(w.sprinting){
      cx.strokeStyle='rgba(255,255,255,0.12)';cx.lineWidth=2*wSize
      cx.beginPath();cx.arc(h.x,h.y,hr*1.6,0,Math.PI*2);cx.stroke()
      const tail=w.seg[w.seg.length-1]
      if(tail&&fc%2===0){
        spawnParticles(tail.x,tail.y,col,Math.ceil(wSize),2,.3)
      }
    }

    // Eyes
    const eo=hr*.4,er=Math.max(1,hr*.22)
    for(const sd of[-1,1]){
      const ex=h.x+Math.cos(ea+sd*.5)*eo,ey=h.y+Math.sin(ea+sd*.5)*eo
      cx.fillStyle='#fff';cx.beginPath();cx.arc(ex,ey,er,0,Math.PI*2);cx.fill()
      cx.fillStyle='#111';cx.beginPath();cx.arc(ex+Math.cos(ea)*er*.3,ey+Math.sin(ea)*er*.3,er*.55,0,Math.PI*2);cx.fill()
    }

    // Mouth line
    cx.strokeStyle=dark;cx.lineWidth=1.2;cx.globalAlpha=0.4
    const ml=hr*0.35,mw=hr*0.12
    cx.beginPath();cx.moveTo(h.x+Math.cos(ea-Math.PI/2)*mw+Math.cos(ea)*ml,h.y+Math.sin(ea-Math.PI/2)*mw+Math.sin(ea)*ml)
    cx.lineTo(h.x+Math.cos(ea+Math.PI/2)*mw+Math.cos(ea)*ml,h.y+Math.sin(ea+Math.PI/2)*mw+Math.sin(ea)*ml)
    cx.stroke();cx.globalAlpha=1

    // Spectate highlight
    if(spectateW&&w===spectateW){
      cx.strokeStyle='#ffe044';cx.lineWidth=2;cx.setLineDash([4,4])
      cx.beginPath();cx.arc(h.x,h.y,hr*2.4,0,Math.PI*2);cx.stroke();cx.setLineDash([])
    }

    // Effect icons
    const fxKeys=Object.keys(w.effects)
    if(cam.zoom>0.04&&fxKeys.length>0){
      const icons=fxKeys.map(k=>EFFECT_ICON[k]||'✨').join(' ')
      cx.font='9px sans-serif';cx.textAlign='center';cx.textBaseline='bottom'
      const cw=cx.measureText(icons).width+8
      cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(h.x-cw/2,h.y-hr-26,cw,12)
      cx.fillText(icons,h.x,h.y-hr-16)
    }

    // Personality / label
    if(cam.zoom>0.04&&w.st>5){
      const per=getPersonality(w)
      cx.font='8px sans-serif';cx.textAlign='center';cx.textBaseline='bottom'
      const txt=per.emoji+' '+per.lbl,cw=cx.measureText(txt).width+8
      cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(h.x-cw/2,h.y-hr-14,cw,12)
      cx.fillStyle=col;cx.fillText(txt,h.x,h.y-hr-4)
    }
  }
}

function getPersonality(w){
  const s=w.st,k=w.kills,f=w.foodEaten,d=w.distTraveled,m=w.mass
  if(!s||s<3)return{emoji:'🟢',lbl:'Normal'}
  const rK=k/s,rF=f/s
  if(m>50)return{emoji:'🐉',lbl:'Giant'}
  if(k>5&&m>20)return{emoji:'💀',lbl:'Killer'}
  if(rK>0.08)return{emoji:'⚔️',lbl:'Aggressive'}
  if(w.zones.inEnemy&&m<8)return{emoji:'🏃',lbl:'Fleeing'}
  if(f<1&&s>15)return{emoji:'⭐',lbl:'Starving'}
  if(rF>0.5)return{emoji:'🍽️',lbl:'Hungry'}
  if(d/s<4&&s>15)return{emoji:'🐌',lbl:'Lazy'}
  if(k>m/5&&s>15)return{emoji:'🔪',lbl:'Vicious'}
  if(m<3&&s>10)return{emoji:'🐣',lbl:'Tiny'}
  return{emoji:'🟢',lbl:'Normal'}
}

let worms=[],teamWg={},gen=0,aliveCount=0
let teamEpochs=[],teamModelPools={}
let evoT=new Set()
let pendingDeadTeams=new Set()

function rebuildHash(){
  grid.clr()
  for(const w of worms){if(!w.alive)continue;for(const s of w.seg){grid.add(s.x,s.y,s);s.w=w}}
  for(const f of foods)grid.add(f.x,f.y,f)
}

function updateAll(){
  rebuildHash()
  for(const w of worms){
    if(!w.alive)continue
    w.think()
  }
  for(const w of worms)w.update()
  aliveCount=worms.filter(w=>w.alive).length

  // Update selected worm info
  if(selectedWorm&&selectedWorm.alive&&fc%30===0)updateWormInfo()
}

function getModelFromPool(team,pool){
  if(!pool||!pool.length)return null
  return pool[Math.floor(Math.random()*pool.length)]
}

function respawnTeam(team){
  teamDead[team]=0
  const pool=teamModelPools[team]
  for(const w of worms)if(w.team===team){
    const wg=pool?pool[Math.floor(Math.random()*pool.length)]:rW()
    const mi=pool?Math.floor(Math.random()*pool.length):0
    w.reset(wg,mi)
  }
}

function eliminateTeam(team){
  pendingDeadTeams.add(team)
  needsEvo=true
  // Reset synchronously, so a wiped-out team never waits for the server.
  respawnTeam(team)
  sendStats()
}

async function initFromServer(){
  try{
    const [cfgRes,zRes,pRes,obsRes]=await Promise.all([
      fetch('/config'),fetch('/zones'),fetch('/pools'),fetch('/obstacles')
    ])

    const cfg=await cfgRes.json()

    W=cfg.worldSize;H=cfg.worldSize;CELL=W/20;GRID=Math.ceil(W/CELL)
    N_HIDDEN1=cfg.nHidden1||N_HIDDEN1;N_HIDDEN2=cfg.nHidden2||N_HIDDEN2;N_HIDDEN3=cfg.nHidden3||N_HIDDEN3
    N_INPUT=cfg.nInput||N_INPUT;N_OUTPUT=cfg.nOutput||N_OUTPUT
    WC=cfg.weightCount||WC
    N_TEAMS=cfg.nTeams;WPT=cfg.wormsPerTeam;MPT=cfg.modelsPerTeam
    FOOD_COUNT=cfg.foodCount;SR=cfg.segRadius;HR=cfg.headRadius
    SEG_DIST=cfg.segmentDist;INIT_SEG=cfg.initialSegments
    SPEED=cfg.baseSpeed;SPRINT_SPEED=cfg.sprintSpeed;SPRINT_MC=cfg.sprintMassCost
    ZR=cfg.zoneRadius;ZD=cfg.zoneDamage||ZD
    TN=cfg.teamNames;TC=cfg.teamColors
    CN=TC.map(c=>parseInt(c.slice(1),16))
    gameMode=cfg.gameMode||gameMode
    OBSTACLES_ENABLED=cfg.obstaclesEnabled!==false

    document.getElementById('infoMap').textContent=`${W}x${W}`
    document.getElementById('mode-lbl').textContent=gameMode.toUpperCase()
    document.getElementById('hMode').textContent=gameMode.toUpperCase()

    cam.tzoom=Math.min(.2,30000/W*0.12)
    cam.tx=W/2;cam.ty=H/2

    teamDead=new Array(N_TEAMS).fill(0)
    teamEpochs=new Array(N_TEAMS).fill(0)
    wormIdCounter=0

    clearFood();spawnFood(Math.floor(FOOD_COUNT*0.5))

    // Zones
    if(zRes.ok){const d=await zRes.json();if(Object.keys(d).length)zones=d}
    if(!Object.keys(zones).length)genZones()

    // Pools (all models per team)
    if(pRes.ok){
      const d=await pRes.json()
      for(const[t,data]of Object.entries(d)){
        teamModelPools[t]=data.models.map(w=>new Float64Array(w))
        teamEpochs[t]=data.epoch||0
        if(data.fitness)modelFitness[t]=data.fitness
        if(data.fitness_history)modelFitnessHistory[t]=data.fitness_history
      }
    }

    // Fill missing teams with random pools
    for(let t=0;t<N_TEAMS;t++){
      if(!teamModelPools[t]){
        teamModelPools[t]=Array.from({length:MPT},()=>rW())
      }
    }

    // Obstacles
    if(OBSTACLES_ENABLED&&obsRes.ok){
      const d=await obsRes.json()
      obstacles=d.obstacles||[]
    }

    createWorms()
  }catch(e){
    console.error('Server init failed, running standalone:',e)
    genZones()
    N_TEAMS=6;WPT=8;MPT=15
    TN=['Alpha','Shadow','Viper','Cobra','Storm','Blaze']
    TC=['#ff4455','#ff8822','#ffdd33','#44ee55','#00eebb','#44aaff']
    CN=TC.map(c=>parseInt(c.slice(1),16))
    teamDead=new Array(N_TEAMS).fill(0)
    teamEpochs=new Array(N_TEAMS).fill(0)
    wormIdCounter=0
    clearFood();spawnFood(Math.floor(4000*0.5))
    for(let t=0;t<N_TEAMS;t++)teamModelPools[t]=Array.from({length:MPT},()=>rW())
    createWorms()
  }
}

function createWorms(){
  worms=[]
  for(let t=0;t<N_TEAMS;t++){
    const pool=teamModelPools[t]||Array.from({length:MPT},()=>rW())
    for(let i=0;i<WPT;i++){
      const wg=pool[Math.floor(Math.random()*pool.length)]
      const mi=Math.floor(Math.random()*Math.max(1,pool.length))
      worms.push(new Worm(t,i,wg,mi))
    }
  }
}

let sendingStats=false

async function sendStats(){
  if(sendingStats)return
  const deadTeams=[...pendingDeadTeams]
  if(deadTeams.length===0)return
  sendingStats=true
  for(const team of deadTeams)pendingDeadTeams.delete(team)
  const deadStats=[...deadWormsStats];deadWormsStats=[]
  try{
    const res=await fetch('/stats',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({deadStats,deadTeams,totalWorms:N_TEAMS*WPT})})
    if(res.ok){
      setServerStatus(true)
      const d=await res.json()
      const appliedTeams=new Set()
      for(const ev of d.evolutions||[]){
        const team=ev.team
        evoT.add(team)
        try{
          if(ev.models&&ev.models.length){
            teamModelPools[team]=ev.models.map(m=>new Float64Array(m.weights))
            teamEpochs[team]=ev.epoch||0
          } else if(ev.weights){
            teamModelPools[team]=[new Float64Array(ev.weights)]
          }
          respawnTeam(team)
          appliedTeams.add(team)
        }catch(err){
          console.error('Respawn failed for team',team,err)
          teamModelPools[team]=Array.from({length:MPT},()=>rW())
          teamEpochs[team]=(teamEpochs[team]||0)+1
          respawnTeam(team)
        }finally{
          evoT.delete(team)
        }
      }
      for(const t of deadTeams){
        if(!appliedTeams.has(t)){
          teamModelPools[t]=Array.from({length:MPT},()=>rW())
          teamEpochs[t]=(teamEpochs[t]||0)+1
          respawnTeam(t)
          evoT.delete(t)
        }
      }
      if(d.generation!==undefined){gen=d.generation;document.getElementById('hGen').textContent=gen}
      if(d.teamEpochs){
        for(const[t,ep]of Object.entries(d.teamEpochs))teamEpochs[parseInt(t)]=ep
      }
      if(d.poolInfo){
        for(const[t,info]of Object.entries(d.poolInfo)){
          const ti=parseInt(t)
          if(info.fitness)modelFitness[ti]=info.fitness
          if(info.fitness_history)modelFitnessHistory[ti]=info.fitness_history
        }
      }
    }
  }catch(e){
    setServerStatus(false)
  }
  sendingStats=false
  needsEvo=pendingDeadTeams.size>0
  if(pendingDeadTeams.size)sendStats()
}

function updateLeaderboard(){
  const sorted=[...worms].filter(w=>w.alive).sort((a,b)=>b.mass-a.mass).slice(0,20)
  const lb=document.getElementById('lb')
  let html='<div class=t>LEADERBOARD</div>'
  for(let i=0;i<sorted.length;i++){
    const w=sorted[i],c=TC[w.team]
    const sel=cam.spectate===w.uid?' sel':''
    html+=`<div class="r${sel}" data-uid="${w.uid}">
      <span class=nm style=color:${c}>${i+1}. ${w.name}</span>
      <span class=md>[m${w.modelIdx}]</span>
      <span class=sc>${Math.floor(w.score)}</span>
      <span class=ms>${Math.floor(w.mass)}</span>
    </div>`
  }
  lb.innerHTML=html
  lb.querySelectorAll('.r').forEach(el=>{
    el.addEventListener('click',()=>{
      const uid=parseInt(el.dataset.uid)
      cam.spectate=cam.spectate===uid?null:uid
      const w=worms.find(ww=>ww.uid===uid)
      if(w&&cam.spectate!==null){cam.tx=w.seg[0].x;cam.ty=w.seg[0].y;showWormInfo(w)}
    })
  })
}

function updateEpochBar(){
  const eb=document.getElementById('epoch-bar')
  let h='<div class=eb-title>EPOCHS</div>'
  for(let t=0;t<N_TEAMS;t++){
    const tw=worms.filter(w=>w.team===t),al=tw.filter(w=>w.alive).length
    const dotCol=al>0?(TC[t]||'#444'):'#444'
    h+=`<div class=eb-item><span class=eb-dot style=background:${dotCol}></span><span class=eb-name style=color:${TC[t]||'#888'}>${TN[t]||'T'+t}</span><span class=eb-num style=color:${al>0?'#48f':'#555'}>E${teamEpochs[t]||0}</span><span class=eb-alive>${al}/${WPT}</span></div>`
  }
  eb.innerHTML=h
}

// GAME LOOP
// ═══════════════════════════════════════════════════════════════════
let fc=0

initFromServer().then(()=>{
  if(worms.length===0){
    for(let t=0;t<N_TEAMS;t++){
      if(!teamModelPools[t])teamModelPools[t]=Array.from({length:MPT},()=>rW())
    }
    createWorms()
  }
  document.getElementById('hAlive').textContent=worms.filter(w=>w.alive).length

  function loop(){
    requestAnimationFrame(loop)
    fc++

    if(!paused){
      for(let s=0;s<speedMul;s++){
        updateAll()
        tickFood()
        if(speedMul>1&&aliveCount===0)break
      }
      updateParticles(.05*speedMul)
    }
    document.getElementById('hAlive').textContent=aliveCount

    if(cam.spectate!==null&&!drag.d){
      const spec=worms.find(w=>w.uid===cam.spectate)
      if(spec&&spec.alive){cam.tx=spec.seg[0].x;cam.ty=spec.seg[0].y}
      else{cam.spectate=null;hideWormInfo()}
    }

    const snap=.08
    cam.x+=(cam.tx-cam.x)*snap
    cam.y+=(cam.ty-cam.y)*snap
    cam.zoom+=(cam.tzoom-cam.zoom)*snap

    render()

    if(fc%10===0){updateLeaderboard();updateEpochBar()}
    if(needsEvo)sendStats()
    if(fc%20===0&&selectedWorm&&selectedWorm.alive)updateWormInfo()
  }

  loop()
})

// Model fitness tracking

// FITNESS GRAPH
let fitData=[]
const fitCanv=document.getElementById('fitcanv'),fitCtx=fitCanv.getContext('2d')
function drawGraph(){
  const w=fitCanv.width,h=fitCanv.height
  fitCtx.clearRect(0,0,w,h)
  if(!fitData.length){fitCtx.fillStyle='#444';fitCtx.font='10px monospace';fitCtx.textAlign='center';fitCtx.fillText('Waiting...',w/2,h/2-10);return}
  let d=fitData
  if(d.length>2000)d=d.slice(-2000)
  const vs=d.map(x=>typeof x==='object'?x.bestFitness||x.fitness||0:typeof x==='number'?x:0).filter(x=>x!==null)
  if(!vs.length)return
  const mv=Math.max(...vs,1),mn=Math.min(...vs,0),rg=mv-mn||1,pd=10,pw=w-pd*2,ph=h-pd*2
  fitCtx.fillStyle='rgba(68,170,255,0.04)';fitCtx.fillRect(pd,0,pw,ph)
  fitCtx.strokeStyle='rgba(68,68,88,0.2)';fitCtx.lineWidth=0.5
  for(let i=0;i<3;i++){const y=pd+(ph/3)*i;fitCtx.beginPath();fitCtx.moveTo(pd,y);fitCtx.lineTo(pd+pw,y);fitCtx.stroke()}
  fitCtx.beginPath()
  for(let i=0;i<vs.length;i++){const x=pd+(i/(vs.length-1||1))*pw,y=pd+ph-(1-(vs[i]-mn)/rg)*ph;i===0?fitCtx.moveTo(x,y):fitCtx.lineTo(x,y)}
  fitCtx.strokeStyle='#44aaff';fitCtx.lineWidth=1.5;fitCtx.stroke()
  fitCtx.fillStyle='rgba(68,170,255,0.08)';fitCtx.lineTo(pd+pw,pd+ph);fitCtx.lineTo(pd,pd+ph);fitCtx.closePath();fitCtx.fill()
  fitCtx.fillStyle='#555';fitCtx.font='8px monospace';fitCtx.textAlign='left';fitCtx.fillText('Gen',pd+2,pd+8);fitCtx.textAlign='right';fitCtx.fillText(mv.toFixed(0),w-pd,pd+8);fitCtx.fillText(mn.toFixed(0),w-pd,pd+ph-2)
  if(vs.length>1){const lt=vs[vs.length-1],pr=vs[vs.length-2],pc=pr!==0?((lt-pr)/Math.abs(pr)*100).toFixed(1):'+inf';document.getElementById('fitlast').textContent=lt.toFixed(0)+' ('+pc+'%)'}
}
setInterval(async()=>{try{const r=await fetch('/fitness_history');if(r.ok){const d=await r.json();if(d.history&&Array.isArray(d.history)){fitData=d.history;drawGraph()}}}catch(e){}},5000)
</script>
